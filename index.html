<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Blender Model Viewer</title>
<style>
  body { margin: 0; overflow: hidden; }
  canvas { display: block; }
  
  #loader {
    position: fixed;
    inset: 0;
    background: #222222;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity 0.4s ease;
  }
  #loader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .spinner {
    width: 50px;
    height: 50px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  #loader p {
    margin-top: 16px;
    color: #888;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    letter-spacing: 0.5px;
  }
  #loader-percent {
    margin-top: 8px;
    color: #fff;
    font-family: system-ui, sans-serif;
    font-size: 24px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  #loader-speed {
    margin-top: 6px;
    color: #666;
    font-family: system-ui, sans-serif;
    font-size: 12px;
  }

  /* Navigation */
  #nav {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.1);
    z-index: 10;
    font-family: system-ui, -apple-system, sans-serif;
  }
  #nav button {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    padding: 10px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #nav button:hover {
    background: rgba(255,255,255,0.2);
  }
  #nav button:active {
    transform: scale(0.96);
  }
  #nav .divider {
    width: 1px;
    background: rgba(255,255,255,0.15);
    margin: 0 4px;
  }

  /* Help tooltip */
  #help {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 14px 18px;
    font-family: system-ui, sans-serif;
    font-size: 12px;
    color: #999;
    line-height: 1.8;
    z-index: 10;
  }
  #help kbd {
    background: rgba(255,255,255,0.1);
    padding: 2px 6px;
    border-radius: 4px;
    font-family: inherit;
    color: #ccc;
  }
</style>
</head>
<body>

<div id="loader">
  <div class="spinner"></div>
  <p id="loader-text">Loading model...</p>
  <span id="loader-percent">0%</span>
  <span id="loader-speed"></span>
</div>

<nav id="nav">
  <button data-view="front">Front</button>
  <button data-view="back">Back</button>
  <button data-view="left">Left</button>
  <button data-view="right">Right</button>
  <button data-view="top">Top</button>
  <div class="divider"></div>
  <button data-view="reset">Reset</button>
</nav>

<div id="help">
  <kbd>Drag</kbd> Rotate<br>
  <kbd>Scroll</kbd> Zoom<br>
  <kbd>Right-drag</kbd> Pan
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
  import * as THREE from 'three';
  import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  // Scene
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222222);

  // Camera
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.1,
    1000
  );
  camera.position.set(0, 1, 3);

  // Renderer
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.localClippingEnabled = true;
  document.body.appendChild(renderer.domElement);

  // Lights
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
  scene.add(hemiLight);

  const dirLight = new THREE.DirectionalLight(0xffffff, 1);
  dirLight.position.set(5, 10, 7);
  scene.add(dirLight);

  // Controls
  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  // Clip anything too close to camera
  const clipDistance = 0.4;
  const clipPlane = new THREE.Plane();
  const clipDirection = new THREE.Vector3();
  const clipPoint = new THREE.Vector3();
  renderer.clippingPlanes = [clipPlane];

  // Camera views
  const defaultPos = { x: 0, y: 1, z: 3 };
  const views = {
    front:  { x: 0, y: 1, z: 5 },
    back:   { x: 0, y: 1, z: -5 },
    left:   { x: -5, y: 1, z: 0 },
    right:  { x: 5, y: 1, z: 0 },
    top:    { x: 0, y: 6, z: 0.01 },
    reset:  defaultPos
  };

  function animateCamera(targetPos) {
    const start = { x: camera.position.x, y: camera.position.y, z: camera.position.z };
    const duration = 600;
    const startTime = performance.now();

    function update() {
      const elapsed = performance.now() - startTime;
      const t = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - t, 3); // ease-out cubic

      camera.position.x = start.x + (targetPos.x - start.x) * ease;
      camera.position.y = start.y + (targetPos.y - start.y) * ease;
      camera.position.z = start.z + (targetPos.z - start.z) * ease;
      camera.lookAt(0, 0, 0);
      controls.target.set(0, 0, 0);

      if (t < 1) requestAnimationFrame(update);
    }
    update();
  }

  // Navigation buttons
  document.querySelectorAll('#nav button').forEach(btn => {
    btn.addEventListener('click', () => {
      const view = btn.dataset.view;
      if (views[view]) animateCamera(views[view]);
    });
  });

  // Load model
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');

  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  const loaderEl = document.getElementById('loader');
  const loaderPercent = document.getElementById('loader-percent');
  const loaderSpeed = document.getElementById('loader-speed');
  
  // Track download speed
  let lastLoaded = 0;
  let lastTime = performance.now();
  
  loader.load(
    'model.glb',
    function (gltf) {
      scene.add(gltf.scene);
      loaderEl.classList.add('hidden');
    },
    function (progress) {
      if (progress.lengthComputable) {
        const percent = Math.min(100, Math.round((progress.loaded / progress.total) * 100));
        loaderPercent.textContent = percent + '%';
        
        // Calculate download speed
        const now = performance.now();
        const timeDiff = (now - lastTime) / 1000; // seconds
        if (timeDiff > 0.1) { // Update every 100ms
          const bytesDiff = progress.loaded - lastLoaded;
          const speed = bytesDiff / timeDiff; // bytes per second
          
          let speedText;
          if (speed >= 1024 * 1024) {
            speedText = (speed / (1024 * 1024)).toFixed(1) + ' MB/s';
          } else if (speed >= 1024) {
            speedText = (speed / 1024).toFixed(0) + ' KB/s';
          } else {
            speedText = speed.toFixed(0) + ' B/s';
          }
          loaderSpeed.textContent = speedText;
          
          lastLoaded = progress.loaded;
          lastTime = now;
        }
      }
    },
    function (error) {
      console.error(error);
      loaderEl.innerHTML = '<p style="color:#ff6b6b">Failed to load model</p>';
    }
  );

  // Resize handling
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // Animate
  function animate() {
    requestAnimationFrame(animate);
    controls.update();

    camera.getWorldDirection(clipDirection);
    clipPoint.copy(camera.position).addScaledVector(clipDirection, clipDistance);
    clipPlane.setFromNormalAndCoplanarPoint(clipDirection, clipPoint);

    renderer.render(scene, camera);
  }
  animate();
</script>

</body>
</html>
